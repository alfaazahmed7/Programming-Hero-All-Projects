<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="stylesheet" href="./styles/style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind & DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <!-- login section -->
    <section class="login-section bg-gray-100">
        <div class="flex justify-center items-center h-screen">
            <fieldset class="fieldset bg-white border-base-300 rounded-box w-lg  border p-8">

                <div class="text-center">
                    <img class="mb-6 mx-auto" src="./assets/github-logo.png" alt="">
                    <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
                    <p class="text-[#64748B] text-base">Sign in to manage your issues</p>
                </div>

                <label class="label text-base text-[#1F2937] font-medium">Username</label>
                <input id="input-username" type="text" class="input w-full" placeholder="Enter Username" />

                <label class="label text-base text-[#1F2937] font-medium">Password</label>
                <input id="input-password" type="password" class="input w-full mb-5" placeholder="Enter Password" />

                <button id="login-btn" class="btn btn-primary">Sign In</button>

                <div class="grid grid-cols-15 text-center items-center my-6">
                    <hr class="col-span-7 text-[#E4E4E7]">
                    <p class="col-span-1 text-base text-[#1F2937]">OR</p>
                    <hr class="col-span-7 text-[#E4E4E7]">
                </div>

                <div>
                    <p class="text-sm text-[#64748B] text-center mb-2">Demo Credentials:</p>
                    <div class="bg-gray-100 flex flex-col justify-center items-center p-6 rounded-xl">
                        <div class="flex">
                            <p class="text-base text-[#1F2937] font-semibold">Username: </p>
                            <p class="text-base text-[#1F2937]">admin</p>
                        </div>
                        <div class="flex">
                            <p class="text-base text-[#1F2937] font-semibold">Password: </p>
                            <p class="text-base text-[#1F2937]">admin123</p>
                        </div>
                    </div>
                </div>
            </fieldset>
        </div>
    </section>

    <script src="./script/login.js"></script>
</body>

</html>
